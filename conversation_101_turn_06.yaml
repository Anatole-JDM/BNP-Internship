    agent_answer: "Sure, I'd be happy to simplify it! If you find something in your credit report that you believe is incorrect, you can file a dispute to have it investigated. The credit bureaus must remove the disputed information from your report within 30 days if the company that provided the information can't prove that it's accurate. After that, the company that gave the wrong information is responsible for fixing it and updating your report."
