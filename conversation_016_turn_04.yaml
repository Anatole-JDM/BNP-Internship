    macro_informative: ""
    micro_informative: ""
    agent_answer: "I have no specific numbers regarding the increase in cotton production due to the cotton gin. However, the cotton gin revolutionized the cotton industry in the United States, significantly increasing productivity. The modern automated cotton gins offer far higher productivity than their hand-powered forebears. Cotton production expanded from 750,000 bales in 1830 to 2.85 million bales in 1850."

