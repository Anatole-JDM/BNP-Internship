    agent_answer: "Because the  El Niño  early spring can see  temperatures cooler than average with above average precipitation in the central and eastern parts of the state and drier weather in the western parts. It important to note the Tornadoes are most likely in the spring and the month of May experiences the greatest rise in temperatures . There are warm days and cool nights in the Piedmont during the spring with temperatures  somewhat cooler in the mountains and warmer, particularly at night, near the coast and the humidity is lowest.  In the fall you can see the most rapidly change of temperature, especially in October and November although tropical cyclones remain a threat until late in the season.  Due to the leaves changing color in the trees, the Appalachian Mountains are frequently visited at this time of year,"

