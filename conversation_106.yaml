    user_query: "Appalachian Mountains"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "The western section of North Carolina is part of the Appalachian Mountain range . Among the subranges of the Appalachians located in the state are the Great Smoky Mountains , Blue Ridge Mountains , which is a specific region of the Appalachians  with the ridgeline of the mountains varying from being 5 to 65 miles wide , with peaks averaging around 2000 to 4000 ft above sea level . The area is covered in forests with hundreds of species of trees found within the range , and today are a source of timber . Additionally we have Black Mountains, considered the  highest in the eastern United States , and culminate in Mount Mitchell at 6,684 feet ( 2,037 m ) , the highest point east of the Mississippi River. In fact, The Appalachian Mountains divide the eastern seaboard from the Great Lakes and the grasslands of the Midwest .  Every year the Appalachian Mountains attract several million tourists to the Western part of the state , including the historic Biltmore Estate . The scenic Blue Ridge Parkway and Great Smoky Mountains National Park are the two most visited national park and unit in the United States.  And also the Stone Mountain is part of the Appalachian Mountains."

