    macro_informative: ""
    micro_informative: ""
    agent_answer: "That is right. North Carolina, located along the Atlantic Coast, is no stranger to hurricanes and it can experience a significant number of hurricanes during the summer months. Many of them come from the Caribbean Sea up the coast of eastern America , passing by North Carolina . The state has had destructive hurricanes in the past, such as Hurricane Fran, a category 3 hurricane; hurricane Floyd in 1999, which dropped over 24 inches of rainfall, causing the death of more than 35 people and Hurricane Hazel, which was the strongest storm ever to make landfall in North Carolina as a Category 4 in 1954 causing 19 deaths and serious destruction. Additionally, Hurricane Isabel is the most destructive hurricane of the 21st century in the state."

