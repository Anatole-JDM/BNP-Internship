    agent_answer: "I cannot definitively say whether the summer months in North Carolina are enjoyable or not, as relative humidity is highest in the winter suggesting  that the summer months might be less humid.  There is an average of forty - five inches of rain a year ( fifty in the mountains ) . July storms account for much of this precipitation .In fact, North Carolina experience severe weather in  both summer and winter. The summer can bring the threat of hurricanes , tropical storms , heavy rain , and flooding . Indeed, destructive hurricanes that have hit North Carolina include Hurricane Fran , Hurricane Floyd , and Hurricane Hazel , the latter being the strongest storm ever to make landfall in the state , as a Category 4 in 1954 . Hurricane Isabel ranks as the most destructive of the 21st century ."

