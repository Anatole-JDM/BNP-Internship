    user_query: "where does it snow the most in north carolina?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "The mountains in western North Carolina receive the most snow in the state. This is because the Appalachian Mountains act as a barrier, preventing most snowstorms from entering the Piedmont. When snow does make it past the mountains, it is usually light and is seldom on the ground for more than two or three days. However, several storms have dropped 18 inches (460 mm) or more of snow within normally warm areas. For instance, during the 1993 Storm of the Century, most of the northwestern part of the state received somewhere between 2 feet (0.61 m) and 3 feet (0.91 m) of snow. In January of 2000, Raleigh area was hit with more than  20 inches(510 mm) of snowfall. There was also a heavy snowfall totaling 18 inches ( 460 mm ) that hit the Wilmington area on December 22 - 23 , 1989."

