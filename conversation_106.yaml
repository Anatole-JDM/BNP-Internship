    user_query: "What could you tell me overall about North Carollina like its economy ?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "As North Carolina has a great availability of hydroelectric power  and a wide variety of soils , its economy is  very diverse leading the South Atlantic states in industry and agriculture. In fact, the state leads the nation in the production of tobacco , textiles , and furniture. Charlotte , the state 's largest city , is a major textile and trade center. The state 's shipping , commercial fishing , and lumber industries are important to its economy . Service industries , including education , health care , private research , and retail trade , are also important . Research Triangle Park , a large industrial complex located in the Raleigh - Durham area , is one of the major centers in the country for electronics and medical research. However, there has been a clear division in the economic growth of North Carolina 's urban and rural areas . While North Carolina 's urban areas have enjoyed a prosperous economy with steady job growth , low unemployment , and rising wages , many of the state 's rural counties have suffered from job loss , rising levels of poverty , and population loss as their manufacturing base has declined. It is important to note that Tourism has also been a boon for the North Carolina economy as people flock to the Outer Banks coastal area and the Appalachian Mountains anchored by Asheville ."

