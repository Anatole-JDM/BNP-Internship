    user_query: "If I divorce, do I have to share my 401K?  an early withdrawal makes economic sense?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "In the event of a divorce, your 401(k) may be considered a marital asset and could be subject to division. There is a QDRO, a qualified domestic relations order whereby a judge orders this to occur.  It is a very rare circumstance where an early 401(k) withdrawal actually makes any real economic sense as you may end up in the higher income tax bracket."
