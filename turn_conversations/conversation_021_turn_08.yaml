    agent_answer: "No, you cannot deposit 50K into an IRA account. The main restrictions with IRA accounts involve contributions. There is a limit of $5,500 for contributions in 2016 ($6,500 if you're over 50) as long as your adjusted gross income is below a certain level. Full details are available in IRS publication 590."

