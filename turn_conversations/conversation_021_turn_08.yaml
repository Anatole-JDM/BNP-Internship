    user_query: "Is it still advisable to do day trading in an IRA account, with just $5500?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "No, you cannot do day trading with just $5,500. Based on the available information, if you're in the US, you're required to follow the SEC rules on pattern day trading. FINRA rules define a “pattern day trader” as any customer who executes four or more “day trades” within five business days, provided that the number of day trades represents more than six percent of the customer’s total trades in the margin account for that same five business day period. If you trip this rule, you'll be required to maintain $25,000 in a margin brokerage account. If you can't maintain the balance, your account will be locked."

