    user_query: "What are the instructions to do it using Carthage?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "You can install mobile SDK with Carthage as follows. Create a file in the project directory for your app and name it Cartfile. Put the following line in the file: github \"openwhisk/openwhisk-client-swift.git\" > 0.3.0 Or latest version From the command line, type carthage update --platform ios. Carthage downloads and builds the SDK, creates a directory that is called Carthage in the project directory for your app, and puts an OpenWhisk.framework file inside Carthage/build/iOS. You must then add OpenWhisk.framework file to the embedded frameworks in your Xcode project."

