    macro_informative: ""
    micro_informative: ""
    agent_answer: "You can filter messages by Search user statements, Intents, Entities, and Last n days.   Select the drop-down menu and type an intent in the input field, or choose from the populated list. You can select more than one intent, which filters the results using any of the selected intents, including Irrelevant.   Additionally, it is recommended to wait at least 30 minutes after a user's interaction with your assistant before attempting to filter for that content."
