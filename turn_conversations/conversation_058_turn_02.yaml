  - turn_number: 5
    user_query: "are they billed by the number of turns or per conversation?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "Watson Assistant does not bill based on the number of turns or conversations. Instead, it charges based on the number of time series hours collected during a billing cycle. Time series are a unique combination of a metric name and label key-value pairs, and a data-point is the value generated for a time-series at a given point in time.  To monitor how the IBM Cloud Monitoring service is used and the costs associated to its usage, see Viewing your usage."

  - turn_number: 6
