    agent_answer: "I apologize for the misunderstanding. Here's an example of how to install the IBM Cloud Functions SDK for mobile using Carthage from the source code:
1. Clone the IBM Cloud Functions SDK for mobile repository from GitHub: `git clone https://github.com/openwhisk/openwhisk-client-swift.git`
2. Navigate to the cloned repository: `cd openwhisk-client-swift`
3. Install Carthage: `brew install carthage`
4. Run `carthage bootstrap` to build the framework.
5. Add the `OpenWhisk.framework` file to the embedded frameworks in your Xcode project."

