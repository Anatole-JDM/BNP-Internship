  - turn_number: 7
    user_query: "what is NASA Discovery Program? Is Deep Impact Mission part of NASA Discovery program?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "NASA's Discovery Program is a series of cost-effective missions that aim to answer critical questions in solar system science. The program supports the development and implementation of over 20 missions and instruments. The selected investigations will be managed by the Planetary Missions Program Office at NASA's Marshall Space Flight Center in Huntsville, Alabama. The goals of the program are to provide frequent opportunities for principal investigator-led investigations in planetary sciences that can be accomplished under a not-to-exceed cost cap. Yes, Deep Impact Mission is part of NASA Discovery program."

