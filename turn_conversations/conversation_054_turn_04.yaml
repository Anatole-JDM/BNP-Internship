    agent_answer: "The \"best\" river for fishing depends on the specific type of fish being pursued and the angler's preferences. The Yellowstone River is considered one of the world's greatest trout streams. It is officially classed as a blue ribbon stream in Montana from the park to the confluence with the Boulder River east of Livingston and from the mouth of Rosebud Creek near Rosebud, Montana, to the North Dakota border.  The Snake River was once one of the most important rivers for the spawning of anadromous fish -- which are hatched in the headwaters of rivers, live in the ocean for most of their lives, and return to the river to spawn -- in the United States."

  - turn_number: 5
    user_query: "The Snake River is the longest river in the country."
    macro_informative: ""
    micro_informative: ""
    agent_answer: "No. The Snake River is the thirteenth longest river in the United States. The longest river is the Mississippi River, the chief river of the second-largest drainage system on the North American continent, second only to the Hudson Bay drainage system. Using the longest stream as the source, Brower's Spring in Montana, the source of the Missouri River, would give it an incredible length of 3,710 miles, making it the fourth longest river in the world after the Nile, Amazon, and Yangtze. If we use the Largest Stream measurement, the Ohio River, and by extension the Allegheny River would be the source, and the Mississippi would begin in Pennsylvania."

