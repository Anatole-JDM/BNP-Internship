    user_query: "Name the sources of light pollution that affect skywatching."
    macro_informative: ""
    micro_informative: ""
    agent_answer: "Light pollution is caused by stray light from various human activities, including parking lots, sport complexes, street lights, and other sources. This scattered light makes it difficult to observe fainter stars and the Milky Way in the night sky. The larger and more developed a city is, the more light pollution it tends to produce, and the effect decreases the farther away you travel from a city."

