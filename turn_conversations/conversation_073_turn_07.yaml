    agent_answer: "In California, the state procurement process is managed by the Department of General Services (DGS). The DGS Procurement Division is responsible for maintaining a statewide contracting system, which provides a centralized location for state agencies to access contracts for goods and services.  For products related directly to the Highway System, Caltrans has a Product Evaluation Program (PEP) to evaluate and approve products for use on California's highways. Caltrans also encourages prospective contractors and vendors to consider programs and preferences available to Small Business (SBs), Disabled Veteran Enterprises (DVBEs), and other businesses covered by state programs."
