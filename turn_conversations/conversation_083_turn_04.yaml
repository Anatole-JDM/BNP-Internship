    agent_answer: "Yes, the New York Safe Boating Certificate is nationally accredited and valid in other states and Canada. However, the Adventure License is not acceptable proof of a safe boating certificate outside of New York State."

  - turn_number: 5
    user_query: "how much is the class and what type of payment do you accept?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "The cost of the boating safety course may vary, but students 18 years of age and older will be required to pay a $10 fee to NYS for issuance of a permanent boating safety certificate. Payment for certificates (both first time and replacement) must be made online at <https://www.ilostmycard.com/>. Please note that no cash or personal checks are accepted. If you require an alternative payment method, you must email [Boating@parks.ny.gov](mailto:Boating@parks.ny.gov)."

  - turn_number: 6
    user_query: "do I still need to get a New York State Boating Safety Certificate if I have certificate from other parties?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "The certificate from the US Coast Guard Auxiliary, the US Power Squadron/America’s Boating Club, or US Powerboating is a boating safety certificate recognized as acceptable by New York State."

  - turn_number: 7
    user_query: "tell me some information about New York State Adventure License Program, please?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "You can turn your NYS driver license into an “adventure license” by adding your lifetime sporting and recreation privileges.  Students successfully completing the on-line course are also eligible to apply for the Adventure License. The New York State Adventure License Program allows eligible individuals to have their driver's license, non-driver ID, or learner's permit indicate completion of the New York Safe Boating Course. This icon is only available for licenses and IDs issued by the NYS DMV, and DMV will automatically place the icon on the license each time it is renewed. However, a U.S. Coast Guard License cannot be listed on the Adventure License. If you move out of state, you must apply for a NY Non-Driver ID to maintain the Adventure License status."

  - turn_number: 8
