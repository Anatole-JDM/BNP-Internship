    agent_answer: "Boaters can prevent most accidents by learning safe boating techniques and using common sense. California boating safety courses are designed to provide boaters with state specific boating laws and federal navigation requirements in many different environments to suit individual boater needs.  It is also designed to increase boating safety on California waterways. Carrying the proper safety equipment on your boat is not only smart, it’s the law! You can find the required safety equipment for your type of boat."
