    agent_answer: "Yes, COVID-19 vaccines have been thoroughly tested for safety and efficacy. They have undergone at least three phases of clinical trials. The vaccines have been proven to help protect against COVID-19 and reduce the risk of severe illness and death. Like any vaccine or medication, the COVID-19 vaccines can cause side effects, although most are mild and short-lived. Common side effects include a sore arm where the shot was given, headache, chills, fever, and Tiredness. These side effects usually go away on their own within a few days. Also, people can have allergic reactions to any medication or biological product, such as a vaccine."

  - turn_number: 8
    user_query: "how does covid vaccine work?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "The COVID-19 vaccines work by teaching our bodies how to make a protein that triggers an immune response. This immune response helps our bodies recognize and fight the virus. COVID-19 vaccines injects a harmless piece of the virus or using a gene from the virus. None of these methods can cause COVID-19. The mRNA vaccines, in particular, do not alter your DNA. Instead, they work outside of your cell's nucleus (where your DNA is kept) and teach your cells how to make the protein that triggers the immune response. Once your cells have finished using the instructions, they break down the mRNA and get rid of it."
