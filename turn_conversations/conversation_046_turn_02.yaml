    agent_answer: "No, it expanded. Rome began expanding shortly after the founding of the Republic in the 6th century BC, but it did not expand beyond the Italian Peninsula until the 3rd century BC. In the 8th century, the Franks, with the support of the Catholic Church, established an Empire that encompassed most of Western Europe. When Charlemagne (known as Karl der Große in German) inherited the Frankish realm, he expanded it to cover all of Central and Western Europe, except for the southern tip of Italy and Iberia. He proclaimed the reestablishment of the Roman Empire (calling it the Holy Roman Empire) and was crowned as Roman Emperor by the Pope in Rome."

