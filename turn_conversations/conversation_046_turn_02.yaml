    user_query: "why was the eastern roman empire called the byzantine empire"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "Modern historians refer to the Byzantine Empire as such to distinguish it from ancient Rome. This name comes from Byzantium, the original name of Constantinople, the capital city of the empire. The citizens of the empire continued to refer to their empire as the Roman Empire or Romania and to themselves as \"Romans.\""

