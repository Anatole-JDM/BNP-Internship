    agent_answer: "Yes. The successful Maccabean Revolt resulted in establishing an independent Jewish kingdom in Judea. This kingdom ended when the Roman Empire intervened in the Hasmonean Civil War, leading to Herod the Great's installation and the Herodian kingdom's consolidation as a vassal Judean state of Rome. Subsequently, the Roman Republic installed the Herodian dynasty in Judea and, in 6 CE, created the Roman province of Judea. Judea remained a Roman province until the failed Jewish revolts between Jews and Greco-Romans, which led to widespread destruction, the expulsion of the Jewish population and genocide, and the renaming of the region from Judea to Syria Palaestina. After the failure of the Bar Kokhba revolt in 132 CE, the Jewish presence in the region significantly dwindled."
