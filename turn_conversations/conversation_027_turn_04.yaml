    user_query: "How do I find specific conversations?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "To find specific conversations, you can use the time period control to choose the period for which data is displayed. This control affects all data shown on the page, including the list of conversations. You can choose to view data for a single day, a week, a month, or a quarter. However, please note that the statistics can cover a longer time period than the period for which logs of conversations are retained. For each entity you can select from the Values column to see a list of the most common values that were identified for this entity during the time period."

