    agent_answer: "It is generally recommended to start as early as possible. Everyone thinks that they don't make enough to start saving. Don't put it off. Save some money out of each paycheck even if it is only $50. Now for the bad news. $1mm is not enough to retire on. The general rule of thumb is that you should have 25x your annual expenses saved when you retire. The only time to stop saving money for retirement is when you have enough money to retire tomorrow. Remember: you are likely to live to 100, so you better save enough to live that long. I don't trust social security to be there. 35 is not mid-life. You're on the tail end of the age to get started on retirement planning. There's a table on one of the FIRE (Financial Independent, Retire Early) websites that shows a graph between % of income saved and the number of years it takes to save enough to be financially independent."

  - turn_number: 7
    user_query: "Do I get taxed on my retirement income?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "Retirement income is taxed as ordinary income. If you get a lump sum payment out of the pension, when you retire, you will be taxed. In retirement your income may be structured completely differently than when you are working. For example, you may also have a Roth IRA/401K to pull from. Traditional IRA and 401(k) contributions are made pre-tax, and withdrawals in retirement are taxed as ordinary income. Roth IRA and Roth 401(k) are the opposite: you pay income tax up front before putting money into the retirement account, but you will eventually withdraw without paying any additional tax at that time."
