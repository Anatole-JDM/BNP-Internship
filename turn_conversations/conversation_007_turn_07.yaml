    agent_answer: "The propulsion subsystem of the Europa Clipper will carry fuel and oxidizer to change its velocity by about 3,600 miles per hour (5,800 kilometers per hour). While this is a significant and crucial capability, it represents only about five percent of the velocity change needed for the mission. The majority of the velocity change required to adjust trajectories once in Jupiter's orbit will come from planned gravitational flybys of Jovian moons. The propulsion subsystem can be thought of as the \"gas tank\" of the Europa Clipper."

