    agent_answer: "If you know someone who has been a victim of identity theft, they should contact the Federal Trade Commission (FTC). Report identity theft at IdentityTheft.gov and consider placing a fraud alert or security freeze on their credit reports. They can also contact their local police department to file a report."

  - turn_number: 8
    user_query: "how long to cleart?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "If a person has been a victim of identity theft, the process to clear their name and records can vary depending on the severity and extent of the theft. Consider seeking professional help from a credit counselor or identity theft recovery service. The FTC site provides victims with a personal recovery plan, walking through each step to take. It also provides pre-filed letters and forms to send to credit bureaus, businesses, and debt collectors.  Keep in mind that clearing their name and records can be a time-consuming and stressful process."
