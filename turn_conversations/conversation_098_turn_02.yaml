  - turn_number: 1
    user_query: "What are the differences between query parameters and message parameters?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "Query parameters and message parameters are two types of parameters sent from WebSocket API. Query parameters are sent when phone integration connects to the service and are used in queries written with the Discovery Query Language. Message parameters are sent as part of the JSON data in the request body."

  - turn_number: 2
    user_query: "can you tell me more about WebSocket API?"
    macro_informative: ""
    micro_informative: ""
    rewrite:
      rewritten_query: ""
      macro_informative: ""
      micro_informative: ""
      correctness:
        changes: ""
        groundedness: ""
    agent_answer: "Of course! The WebSocket interface of the IBM Watson® Speech to Text service is the most natural way for a client to interact with the service. Because of their advantages, WebSockets are the preferred mechanism for speech recognition.  The WebSocket interface can take minutes to produce final results for a recognition request for an especially long audio file. For the WebSocket interface, the underlying TCP connection remains idle while the service prepares the response."

  - turn_number: 3
    user_query: "how can I use WebSocket API?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "To use the WebSocket interface, you first use the /v1/recognize method to establish a connection with the service. You specify parameters such as the language model and any custom models that are to be used for requests that are sent over the connection. You then register event listeners to handle responses from the service. For the WebSocket interface, you first specify the customization ID with the language_customization_id parameter of the /v1/recognize method. You use this method to establish a WebSocket connection with the service. To use the WebSocket API for speech recognition, you first establish a persistent connection with the service using the /v1/recognize method. Then, you send text and binary messages over the connection to initiate and manage recognition requests. To synthesize text to speech with the WebSocket interface of the IBM Watson® Text to Speech service, you first establish a connection with the service by calling its /v1/synthesize method. You then send the text to be synthesized to the service as a JSON text message over the connection."

  - turn_number: 4
    user_query: "what is the customization ID here?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "Customization_id identifies the custom model's Globally Unique Identifier (GUID). The GUID is used to identify the model in methods of the interface. You can specify the customization ID of the custom model to which the grammar is to be added."

  - turn_number: 5
    user_query: "I want to secure the phone connection before the integration"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "To secure the phone connection before integration, you can go to the Advanced options tab in the phone integration settings and select one or both of the following options:
1. Force secure trunking: This option uses Secure Real-Time Transfer Protocol (SRTP) to secure the audio that is transmitted over the phone.
2. Enable SIP authentication: This option requires SIP digest authentication for all inbound traffic. When this option is selected, the SIP digest user name and password must be configured, and the SIP trunk being used to connect to Assistant must be configured to use only TLS. However, if you use Twilio as your SIP trunk provider, you cannot enable SIP authentication for outbound SIP trunks to Watson Assistant.
Additionally, to configure how your assistant interacts with a SIP trunk from an external provider, go to the SIP trunk tab in the phone integration settings and update the SIP trunking integration section. Here, you can list the headers that you want your assistant to use in the \"SIP INVITE headers to extract\" field."

  - turn_number: 6
    user_query: "I want to secure the phone connection before the phone interaction and optimize your actions for phone interaction."
    macro_informative: ""
    micro_informative: ""
    agent_answer: "To secure the phone connection before the interaction, follow the previous steps I've decribed. To optimize your actions for phone interaction, consider the following: 1. Do not include HTML elements in your action responses. Use Markdown for formatting instead. 2. Use a search extension to include search results in actions that the phone integration will read. Make sure the entire search response is less than 5,000 characters long. Test the search results and curate the data collection as necessary."

  - turn_number: 7
    user_query: "what if I want to have more phone numbers for interaction? any limits?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "If you are using existing phone numbers you configured via a SIP trunk provider, you can add multiple numbers to the same phone integration. If you generated a free phone number, you cannot add more numbers. The Voice add-on use is charged separately and in addition to your service plan charges. Plan usage is measured based on the number of monthly active users, where a user is identified by the caller's unique phone number."

  - turn_number: 8
    user_query: "what if I have call and transfer failures; therefore, I need to use other third-party providers."
    macro_informative: ""
    micro_informative: ""
    agent_answer: "You can configure the phone integration to transfer the caller to a human agent if the phone connection fails for any reason. IBM has established relationships with Five9, Genesys, Vonage, and Voximplant. These providers can set up a SIP trunk for your voice traffic and manage access from allowed IP addresses. The network configuration required to support the SIP trunk connection can typically be handled for you with minimal effort. If you need assistance setting up an account with another SIP trunk provider, you can open a support request."
