    agent_answer: "To introduce your family and friends to Friends, you could start by sharing Friends is an American television sitcom, created by David Crane and Marta Kauffman, with an ensemble cast starring Jennifer Aniston, Courteney Cox, Lisa Kudrow, Matt LeBlanc, Matthew Perry and David Schwimmer. The show revolves around six 20 -- 30-year-old friends living in Manhattan, New York City, and the episodes depict the friends ' comedic and romantic adventures and career issues. The show has also developed an alternative family lifestyle by representing young people that live unconventional domestic lives. It presents the idea that all you need is good friends. It portrays a new way of living life and developing relationships which are not normally seen in conventional society."
