    user_query: "how much were the actors in friends paid"
    agent_answer: "In the first season, the cast members were paid $22,500 per episode. In the second season, their salaries ranged from $20,000 to $40,000 per episode. From the third season onwards, they negotiated for equal salaries as a group. They were paid $75,000 per episode in season three, $85,000 in season four, $100,000 in season five, $125,000 in season six, $750,000 in seasons seven and eight, and $1 million in seasons nine and ten. Additionally, each actor, Jennifer Aniston , Courteney Cox , Lisa Kudrow , Matt LeBlanc , Matthew Perry and David Schwimmer, receives about $20 million in annual residuals from syndication revenue."

