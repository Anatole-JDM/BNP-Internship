    agent_answer: "The series ends with all friends plus Monica and Chandler 's new babies leaving the apartment, heading to Central Perk for a final cup of coffee. The camera 's last view is of all of the characters ' keys to the apartment on the counter table , finishing with a shot of the apartment 's purple door. As for the cast's relationship after the show, they have remained good friends. Jennifer Aniston is even the godmother to Courteney Cox's daughter, Coco. In the official farewell commemorative book Friends 'Til the End, each cast member acknowledged that the cast had become their family."

