    agent_answer: "Friends has a total of 10 seasons with episodes 236. It aired on NBC from September 22 , 1994 to May 6 , 2004."

  - turn_number: 4
    user_query: "did Friends air in different countries? I also wonder if the show earned any awards"
    agent_answer: "Yes, Friends aired in various countries including Australia on the Seven Network, Nine Network, Network Ten, GEM, and Arena; in New Zealand on TV2; in Greece on Star Channel; in Cyprus on CyBC 2 and TVOne; in Canada on Global, Slice, DTour, and TVTropolis; and on different channels in the UK. Regarding awards, It was nominated for 62 Primetime Emmy Awards, winning six. Jennifer Aniston and Lisa Kudrow are the only main cast members to win an Emmy, while Courteney Cox is the only actor not to be nominated. The series also won an American Comedy Award, one GLAAD Media Award, one Golden Globe Award, three Logie Awards, six People's Choice Awards, one Satellite Award, and one Screen Actors Guild Award."

