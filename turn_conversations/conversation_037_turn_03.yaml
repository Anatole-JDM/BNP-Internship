    agent_answer: "Credit scores have a huge financial impact on your life and that is why it is very important to establish a good one. For instance with a decent credit score, increase your chance to get loans . Some insurance companies can even use it to some extent to determine your rates. Additionally having a good credit score demonstrates your ability to repay borrowed funds. Everything stems from that goal; available credit, payment history, collections, etc. all serve to demonstrate whether or not you personally are a good investment for lenders to pursue."
