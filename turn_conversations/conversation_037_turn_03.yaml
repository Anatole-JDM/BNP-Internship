  - turn_number: 1
    user_query: "In the US, does getting a loan with a cosigner, help your credit rating?"
    agent_answer: "In the US getting a loan with a cosigner, it can potentially help your credit rating, but it depends on how the loan is structured and reported. However a loan with a cosigner can bring a lot problems. In the first scenario, if the loan company reports the status to a credit reporting agency on behalf of both the initiating borrower and the cosigner, then both individuals get a new account on their credit report. Initially, this might decrease related credit scores slightly due to a hard pull, new account with zero history, and increased debt. However, over time, it can have a positive effect on both people's credit ratings if the loan is paid properly. Conversely, if the loan is not paid properly, it will negatively affect both people's credit. In the second scenario, if the loan company only reports to a credit agency on one of you (probably the cosigner), leaving the other as just a backup, it will have no effect on the borrower's credit. In the third scenario, if the loan company doesn't report the loan at all to a credit agency, there will be no direct impact on the borrower's credit. However, if the loan goes into collections and is reported as such, it would negatively affect the borrower's credit. Nevertheless a cosigner will make sure you are going to make every single payment on time because otherwise he will be responsible to pay it  ."

  - turn_number: 2
    user_query: "I see, that means if the person does not ot pay his/her loand, the cosigner will be responsability to do it right and how does this work?"
    agent_answer: "Yes, that's right. The co-signer is responsible for the loan just as much as borrower is. In fact if the borrower does not pay, the co-signer is liable for making the payments. When you co-sign a loan, you are essentially saying \"I will pay this loan if the other person can't.\"  The co-signer is 100% liable if for any reason you can't or won't pay. Also this shows up on a credit report just like it's your debt. This limits the amount you can borrow for any reason."

