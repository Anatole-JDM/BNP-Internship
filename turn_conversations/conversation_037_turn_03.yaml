    agent_answer: "Building credit generally means building up your FICO score. Your FICO score is impacted my many factors, one of which is your utilization ratio of your installment loans like student loans. This is the ratio of the current balance to your original balance. To improve your score (slightly) you would want a lower ratio.  You can use some services  that specifically help you boost your credit card score at boostcredit101.com.  They add you as an authorized user to a credit card with a high limit, low balance, and perfect payment history.  You can also request a line of credit increase yourself without waiting for the bank to do so. Use your credit card regularly and also repay  your bills on time. This will help increase your credit score."

