    user_query: "credit rating/credit score"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "Your credit score is a number on a scale of 300 to 900 that can affect all of your financial decisions, from shopping for groceries to applying for a mortgage.  A credit score is your history of accruing debt and paying it back. It is supplemented by your age, time at current residence, time at previous residences, time at your job.  Additionally, your crediting rating is also way creditors let each other know whether you are in a good position and have a strong tendency to repay your debts. They are  : AAA, AA, A, BBB, BBB-, BB+, BB, B, CCC, CC, C, D."

  - turn_number: 5
    user_query: "FICO?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "FICO is financial services company, whose customers are financial services companies. The purpose of the credit score system is two-fold. First, the credit score is intended to make it easy for lending institutions (FICO's customers) to assess the risk of loans that they make.  The second purpose of the credit score is to incentivize consumers into borrowing money. FICO scoring prefers to see a large number of accounts, low utilization, high average account age, low number of inquiries, no late payment.A credit card can be a long running line of credit that will help to boost your FICO score. However if you have student loans, a mortgage, or car payments those will work just as well.  FICO that stands for Fair Isaac Corporation uses information from the 3 major credit bureaus   Equifax, Transunion and Experian. It is important to note that FICO score tracks credit not checking or savings."

