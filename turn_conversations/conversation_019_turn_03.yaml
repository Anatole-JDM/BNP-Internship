    agent_answer: "To lower your taxable income through charitable donations, you should consider donating to organizations that are qualified for tax-deductible contributions, making sure the giving money  will be used for the specific goal the charity declared, and that's the way for you to funnel money to the goals of your preference/choice.  For example, you can donate money to your temple, to a church for the building fund, to a hospital to buy a new x-ray machine, orphanage ,a gay rights organization , to  Red Cross for a specific disaster or even donate money to to the scouts for a new dining hall, etc."

  - turn_number: 4
    user_query: "assets"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "In fact, depending on the size of the donation, you may be able to reduce taxes further by donating appreciated assets, such as stock, bonds, or mutual fund shares that have gone up a lot. That lets you dodge the capital gains tax on redeeming the shares, and if you're donating to a tax-exempt organization they don't have to pay that tax either. When you donate, you should talk to the charity about what's best. Sometimes it is better than donate cash.  You get to both (a) donate untaxed money and then (b) deduct that unrealized money from your income total on your tax return. No special advance planning necessary. Note that your tax consequences could be more complicated depending on your exact situation."

  - turn_number: 5
    user_query: "By the way, if I do a donation in cash for a foreigner organization, could it be used as tax deduction?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "I do not have specific information about donation to an organization  outside of the US related to taxes deduction. However, in UK  you can set up a CAF (Charities Aid foundation) Charity Account. This allows you to donate to charities anonymously, while still allowing the recipient to benefit from Gift Aid (where they can reclaim the income tax you'd paid on the donation). You can even use this account to donate to overseas charities if you're donating at least £250. Or you can use a different intermediary such as BT MyDonate or The Big Give or another intermediary.In general, If you living in the U.S if you are donating this money to charity, you would have to declare the income, and then declare a deduction for the charitable contribution."

  - turn_number: 6
    user_query: "What the most i can donate and declare  as charitable contribution?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "At least on 25K. Accordingly to  IRS publication, the limits depend on the types of organization you're donating to, and the types of property you're donating. Some donations may be limited to the maximum of 20% of your AGI. Bottom line - the maximum you can deduct in almost all circumstances would be 50% of the AGI (very few exceptions allow deducting up to 100% of your AGI). Worth mentioning that whatever you cannot deduct this year - you can roll over to the next year. Nevertheless is good to note that for many people, giving to charity will have minimal effect on their taxes."

  - turn_number: 7
    user_query: "Could I put in my will donations for my dearests organization after my death?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "Yes, you can include charitable donations in your will.  You can even setup a charitable trust to spread the donations out over year or decade. You could even make it so that you can live off the interest until you die, and then the rest goes to the charity. You may also approach some charities with this idea. They can set it up so that the extra funds, if you die early, go to the charity. They will set it up as an annuity through an insurance company they work with."

  - turn_number: 8
    user_query: "Is it necessary to have a will?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "Having a will is highly recommended to ensure that your wishes regarding the distribution of your assets are carried out after your death and the best way is to assign a good lawyer. No matter your net worth, it's important to have a basic estate plan in place. Such a plan ensures that your family and financial goals are met after you die. Beside having a good attorney , the will is included in your estate plan and you also should include  a living will or health-care proxy (medical power of attorney). Keep in mind when you do your estate plan and will  that there are different federal and state laws governing states. Take a  inventory of your assets (investments, retirement savings, insurance policies, and real estate or business interests).It is very important you have a trust, that are legal mechanisms that let you put conditions on how and when your assets will be distributed upon your death. They also allow you to reduce your estate and gift taxes and to distribute assets to your heirs without the cost, delay and publicity of probate court, which administers wills. Some also offer greater protection of your assets from creditors and lawsuits."

  - turn_number: 9
    user_query: "How I get a good lawyer to do my estate plan and my will?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "To find a good lawyer for creating your estate plan and will, you  should interview two or more attorney,  accountants, trust officers, financial advisors and pick the one that you can trust more and sit down  and explain what you want. You  should ask about the attorney's fee the legal services . The average initial cost for the legal drafting of a will, living will and durable power of attorney documentation is between $500 and $1,200, depending on the family size and location."
