    agent_answer: "Fines can be increased under Vehicle Code 42009 for offenses committed in a highway construction or maintenance area and under Vehicle Code 40210 for violations in a Safety Enhancement-Double Fine Zone. Higher fines apply for violations in a school zone, a business district, a senior center zone, or railroad crossing. A $40 court security fee is added for each infraction, misdemeanor, or felony conviction under Penal Code Section 1465.8, effective June 27, 2014. An assessment of $30 for each misdemeanor or felony and $35 for each infraction, added for each conviction under Government Code 70373, effective January 1, 2009. Furthermore, a 20% State Surcharge is imposed on the base bail or base fine amount, effective September 20, 2002."
