    agent_answer: "It is important to note the primary sources are distinguished from secondary sources , which cite , comment on , or build upon primary sources .Normally, accounts written after the fact with the benefit ( and possible distortions ) of hindsight are secondary . A secondary source  interprets or analyzes primary sources. Also be a primary source depending on how it is used . For example , a memoir would be considered a primary source in research concerning its author or about his or her friends characterized within it , but the same memoir would be a secondary source if it were used to examine the culture in which its author lived. Both sources should b e be understood as relative terms , with sources categorized according to specific historical contexts and what is being studied . For instance, Documentary films can be considered a secondary source or primary source , depending on how much the filmmaker modifies the original sources depending upon the present state of knowledge within the field ."
