    agent_answer: "Yes, these animal infectious diseases are regionally affected. Chronic wasting disease (CWD) has been diagnosed in free-ranging deer, elk, and moose populations in 34 states and four Canadian provinces. West Nile virus has been reported in nearly 44,000 cases in the United States since 1999, with some states reporting more cases than others. Plague is most commonly found in the western United States, particularly in rural areas. Regarding the regional distribution of CWD, it was first described in mule deer at a captive facility in Colorado in 1967.  Additionally, it has been found in captive elk and Sika deer in South Korea, free-ranging moose and reindeer in Norway, and free-ranging moose in Finland."

