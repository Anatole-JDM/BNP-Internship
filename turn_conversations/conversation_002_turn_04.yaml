    user_query: "\"What are the sheltered rooms designated for use?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "A safe room, as defined by FEMA, is designed to provide shelter from tornadoes. However, if the safe room is located below ground, it may not be suitable for protection during a weapons of mass destruction event. The Red Cross recommends safe rooms for areas prone to tornadoes. It's important not to confuse safe rooms for tornadoes with shelter-in-place rooms. An above-ground safe room with no windows can also be used as a shelter-in-place location. It's important to note that a safe room used for protection from windstorms is different from a room selected for shelter-in-place, although they serve a similar purpose. If an above-ground safe room for windstorms has no windows, it can also be an ideal location for sheltering-in-place."

  - turn_number: 2
    user_query: "What items should I keep?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "Being prepared to take care of yourself during a disaster is crucial. This means having enough food, water, and other supplies to last at least three days if stores are closed and roads are impassable due to a flood or winter storm. While local officials and relief workers will be available after a disaster, they may only be able to reach some people after a disaster. You could receive help within hours, but it may take days. It's important to note that the recommendation to have at least three days' worth of disaster supplies differs from the advice to shelter in place, which may involve using duct tape and plastic sheeting during an emergency. The Red Cross advises people to have these supplies on hand if needed."

  - turn_number: 3
    user_query: "Is it the same for earthquakes?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "Each disaster has its characteristics, but it's important to plan and prepare today for you and your family to recover from an emergency tomorrow. Here are some steps you can take: 1. Get an Emergency Supplies kit lasting up to three days per family member, and remember supplies for your pets. 2. Make a family communication plan, including shelter-in-place and evacuation procedures. 3. Stay informed by visiting Ready.gov and signing up for emergency notifications from San Mateo County (SMC) Alert. 4. Get involved by signing up for a Community Emergency Response Team (CERT) course and learning life-saving techniques in a CPR class. Remember, earthquakes can happen suddenly and without warning. Identifying potential hazards and planning can reduce the risk of severe injury or loss of life during an earthquake. If your home is damaged, check for gas leaks and avoid using toilets if you suspect sewage lines are damaged. Contact the gas company and a plumber if needed. In the same way, if water pipes are damaged, please contact the water company and avoid using tap water. You can obtain safe water by melting ice cubes. Each county prone to earthquakes has guides to help citizens before, during, and after an earthquake. Please reach out to your city hall for more information."

