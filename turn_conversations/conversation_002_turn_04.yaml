    agent_answer: "Although I don't have the exact information about which state has more wildfires, it is known that the 2018 wildfire season in California was the deadliest and most destructive on record in the state. In the 2020 California wildfire season, record-setting wildfires burned across the state, with nearly 10,000 fires burning over 4.2 million acres by the end of the year. This accounted for more than 4% of the state's roughly 100 million acres of land, making 2020 the largest wildfire season in California's modern history. The August Complex fire, part of the 2020 wildfire year, has been described as the first \"gigafire\" due to the area burned exceeding 1 million acres. This fire spread across seven counties and was larger than the state of Rhode Island."

