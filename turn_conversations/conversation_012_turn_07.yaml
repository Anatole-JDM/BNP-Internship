turns:
  - turn_number: 1
    user_query: "Is it worth having a web chat widget on my website?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "Yes, it is worth having a web chat widget on your website. The web chat integration can help your customers with common questions and tasks; it can understand customer messages in any of the languages that are supported by the service, and it engages your users when they need help, answering their questions quickly and efficiently, and providing fallback options so there is always a path to a solution. It is also customizable, secure, and supports a wide range of desktop and mobile browsers. Building a custom user interface for these functionalities would require significant time and effort, which could be better spent on building a high-quality assistant. Additionally, the web chat widget is easy for you to deploy and easy for customers to use."

  - turn_number: 2
    user_query: "how to add web chat widget?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "From the Assistants page, click to open the assistant tile that you want to deploy to your site. From the Integrations section, click the Web chat tile and click Open. The Open web chat window opens. In the Environment field, select the environment you want the web chat widget to connect to. Click Confirm. All you need to do is embed a generated script element in your HTML source."

  - turn_number: 3
    user_query: "Can I extend the web chat? if so, how can I do that?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "Yes, extend the web chat. If you are a developer, you can extend the capabilities of the web chat by using the Watson Assistant web chat toolkit on GitHub. You can also you can further customize and extend the web chat by writing code and using the web chat API."

  - turn_number: 4
    user_query: "Is web chat secure enough for me to pass some sesitive data?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "When you enable web chat security, all messages received by the web chat integration that are not accompanied by a properly signed JSON Web Token (JWT) will be rejected. JWTs are digitally signed using a private encryption key that only you have, ensuring that each message originates with your website. You can also use the public key provided by IBM to add an additional level of encryption for passing sensitive data from the web chat. This private context variable will be available for use by the dialog but not by anything else."

  - turn_number: 5
    user_query: "I do not like the look of my web chat and how it opens and closes..."
    macro_informative: ""
    micro_informative: ""
    agent_answer: "You can customize the look and behavior of your web chat. From the Style tab of the web chat configuration page, you can change the color of the launcher icon and the text font. You can choose to use a different base Carbon Design theme as well. If you want to make more advanced customizations, you can change the launcher icon used to open the web chat widget and how it opens and closes. For example, you can launch the web chat from a different button or process on your website, open it in a different location or size, hide the launcher icon entirely, or hide the close button."

  - turn_number: 6
    user_query: "i am having hard time finding web chat whenever I was trying to use"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "From the Home screen tab, turn the home screen feature On. You can add a greeting that is engaging and invites the user to interact with your assistant. If you are a developer, you can customize the home screen further. A Get started heading is displayed before the list of conversation starter messages. A developer can change the heading text by replacing the homeScreen_conversationStarterLabel in the web chat language strings file."

  - turn_number: 7
    user_query: "Add user identity information"
