    rewrite:
      rewritten_query: "How can I add user identity information to a web chat widget?"
      macro_informative: ""
      micro_informative: ""
      correctness:
        changes: ""
        groundedness: ""
    agent_answer: "If you do not enable security, and you want to perform tasks where you need to know the user who submitted the input, then you must pass the user ID to the web chat integration. If you do enable security, you set the user ID in the JSON Web Token instead. You should choose a non-human-identifiable ID. For example, do not use a person's email address as the user_id."

  - turn_number: 8
    user_query: "how does web chat work?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "The web chat provides a convenient chatbot interface that you can add to your website without writing any code. After adding the web chat script to your website, a launcher icon appears in the bottom right corner. When a customer clicks the launcher, the web chat window opens, displaying a greeting and suggested conversation starters. The customer can click a conversation starter or type a message to begin the conversation. The appearance and behavior of the web chat can be configured and customized to match your website style and branding. The web chat uses the Watson Assistant v2 stateful API to communicate with the assistant and supports a variety of devices and platforms. The web chat integration undergoes tests and scans on a regular basis to find and address potential security issues"
