    user_query: "What approaches are there for pricing a small business?"
    agent_answer: "One approach is to determine the lowest amount a seller would accept, which is the liquidation value. This involves calculating the value of the business's assets, such as land, house, furnishings, and accounts payable, minus any liabilities. Another approach is to price the business based on a multiple of its annual earnings. This can be done using a discounted cash flow analysis, where you project the business's earnings out in perpetuity and discount it by the going interest rate. Alternatively, you can use an industry multiplier to multiply the business's EBITDA (Earnings Before Interest, Taxes, Depreciation, and Amortization) by a factor common in the industry. From the documents, it appears that the 2011 EBITDA multiplier for hospitality industries is 13.8. and in the end for small business in most sectors you can use a rule of thumb, 2x net + FFE."

  - turn_number: 2
    user_query: "What could be the reason that most small business fail along the way?"
    agent_answer: "One of the reason most small businesses fail it is because banks usually know that small businesses are a huge risk and are unwilling to provide loans for them to survive. They aren't able to survive in the short-term no matter how good the prospects are in the long-term. They work crazy long hours and submit themselves to huge financial risk. Most owners have no interest in taking true responsibility for the company's health and in the end business has one imperative: to make money. Moreover some small owners business are lacked of some  intangible qualities of entrepreneurship. They  put in loads of commitment or loads of money into an idea that just isn't right. Or they spend money in the wrong ways."

  - turn_number: 3
    user_query: "What does it makes a business to go forward?"
    agent_answer: "A business can move forward successfully by having a solid business model with minimal startup costs and low overhead costs. It's important to have a competitive advantage and offer extra value to customers. This can be achieved by becoming savvy in spotting good deals and reselling products for a higher price. Additionally you need to be careful with the structure, do all the research; understand the risk and opportunities as much you can.  Indeed to move forward in your business you need to make the things happen, you have to do the marketing and sale-link up with your prospective customers. And you have to have a well designed and well operating business. The key to good business management is \"\"do unto others as you would have them do unto you\"\" - ie. look at your business from your customers' perspective. In the end the point of a business is to make a profit . However, have some criteria for success or failure. Don't end up caught in the sunk costs fallacy. If the business isn't going to provide a better life than working, pull the plug early."

  - turn_number: 4
    user_query: "Speaking about good and bad business, what does it make a good manager?"
    agent_answer: "One of the first things that a good manager must have is empathy. The last thing you want is unhappy employees. You can gain their confidence by being good at your job and making their job feel better. A good manager can find out what people's real skills are then design the role around them. They don't force people into strictly defined roles. It is essential to learn how to do the job and don't be afraid to step in and help out. If you never do this people will assume you think you're too good to do the work they do and they won't respect you or your authority. Being good at something gives you natural authority and people will seek you out for advice/direction. Trust your employees to do their jobs until they prove otherwise. Management is a relationship and relationships are based on trust. A manager should be much more aware of how each person contributes to the whole, what their strengths are, who to talk to about what, and how, and why. Moreover  good managers have the most immediate influence over the comfort of their employees while on the job. Comfortable office furniture, equipment that doesn't suck, amenities to make being at work more of a pleasure - all means of showing employees they're treated as valuable professionals."

