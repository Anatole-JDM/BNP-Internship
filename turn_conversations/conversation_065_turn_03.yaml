  - turn_number: 9
    user_query: "Search skill"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "When Watson Assistant can't provide a direct solution, it uses a search skill to find an answer from your various self-service content sources. The search skill works with IBM Watson® Discovery service to extract information from a designated data collection. By creating a search skill, you'll receive a free instance of Discovery. After setting up the search, you can test it by sending queries and preview the results in the search skill's Preview pane."
