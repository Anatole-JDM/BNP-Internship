    user_query: "Are dialogue skills necessary?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "Yes. Dialog Skill contains the training data and dialog that your assistant uses to chat with customers. It is a container for all the artifacts that define a conversation flow. Customize your assistant by adding the necessary skills to satisfy your customers' goals."

  - turn_number: 6
    user_query: "What is the difference with the dialog node?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "The dialog node response is similar to a Then statement in If-Then-Else programming logic. A skill performs the work of the assistant. A dialog skill contains the training data and dialog that your assistant uses to communicate with customers."

