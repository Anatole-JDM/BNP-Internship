    user_query: "Are there any downsides of investing in foreign markets?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "Yes, there are several downsides to investing in foreign markets. One of the main risks is exchange rate risk, which occurs when there is a currency movement that makes your investment worth less, regardless of the stock's performance. This can be mitigated using exchange rate swaps. Another risk is political risk, which includes potential issues such as a country deciding to seize foreign nationals' assets or applying sanctions that make it difficult to get your money back. Additionally, there may be a lack of understanding of foreign countries' laws, tax codes, and customs related to investments, and it can be challenging to stay informed about company-specific issues in foreign countries. As an individual investor, it may not be feasible to dedicate the necessary time to monitor international relations and the foreign country's news. Furthermore, foreign stocks may be thinly traded on your local stock market, making it harder to buy and sell, and you may be late to the game if there is a sudden change in the share price in the original country. Lastly, for foreign stocks, news and intraday price moves often happen while you're asleep, making it challenging to respond promptly."
