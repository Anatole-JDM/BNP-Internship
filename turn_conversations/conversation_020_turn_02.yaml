    user_query: "how does pre-market trading work?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "Pre-market trading takes place before the regular trading hours (RTH) of the stock market. For example, pre-market hours are from 4:00 a.m. to 9:30 a.m. Eastern Time (ET) on the NASDAQ stock market. During pre-market hours, you can place limit orders, but you cannot place market orders due to lower liquidity. This is because the volume and liquidity are generally much lower during pre-market hours compared to RTH. If an unexpected world event occurs, the volume and liquidity might increase. It is important to note that not all brokers allow pre-market trading, and if they do, you might need to specify that you want your order to be executed during pre-market hours."

