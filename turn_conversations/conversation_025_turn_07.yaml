    agent_answer: "Any decisions a business makes are for one reason: $$$. Decision-makers must CONSTANTLY re-evaluate not only the current climate but the future.  If business owners aren't careful, it very well could collapse, and in the end, if it fails, nobody else is responsible except themselves. So, in times of success, yes, the business owners reap profit, but in tough times, they have to take full responsibility and the consequences of reality. You can't run a business without making \" $$$.\" Good will and good intentions only go so far, and they do not always equate to positive results. Capitalism rewards the positive results of proper decision-making in the marketplace as businesses generate enough profit to allow them to stay afloat and expand, while those businesses that do not follow through with appropriate decision-making reap negative results, fail, and eventually go out of business."

  - turn_number: 6
    user_query: "What about employees?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "As your company grows, you tend to add people in \"layers.\" The top layer is the first founder or founder. There may be one, two, three, or more of you, but you all start working at about the same time, and you all take the same risk: quitting your jobs to work for a new and unproven company. 
The second layer is the first actual employees. By the time you hire this layer, you've got cash coming in from somewhere (investors or customers—doesn't matter). These people didn't take as much risk because they got a salary from day one, and honestly, they didn't start the company, they joined it as a job. The third layer consists of later employees. By the time they joined the company, it was going pretty well. Each \"layer\" will be approximately one year for many companies. When your company is big enough to sell to Google or go public, you probably have about six layers: the founders and roughly five layers of employees. Each successive layer is more significant. It's very important to keep your employees happy and ensure they feel part of something other than a job. Make them feel like they're part of a family and support system."

