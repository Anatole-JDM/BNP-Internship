    agent_answer: "Government offices have been moving progressively to Berlin. Under the terms of the treaty between West and East Germany, Berlin became the capital of a unified Germany.  The Bundestag voted in June 1991 to make Berlin the seat of government, but the political institutions remained at Bonn for the time being. Only after a heated 1991 debate did the Bundestag conclude on moving itself and most of the government to Berlin as well, a process that took until 1999 to complete. Many government departments still maintain sizable presences in Bonn."

