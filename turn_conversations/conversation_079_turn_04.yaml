    agent_answer: "Here are the types and causes of male and female infertility: Male infertility can be caused by: 1. Low semen quality 2. Endocrine problems 3. Drugs 4. Radiation 5. Infection 6. Testicular malformations 7. Hormone imbalance 8. Blockage of the duct system 9. Primary ciliary dyskinesia 10. Antisperm antibodies Female infertility can be caused by: 1. Inability to ovulate 2. Malformation of the eggs 3. Polycystic ovarian syndrome 4. Failure of ovaries to mature and release eggs 5. Ovulatory problems These causes can be diagnosed and, in some cases, treated through medical intervention. However, in about 10-20% of cases, no cause is found."

