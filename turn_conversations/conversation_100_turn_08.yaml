    agent_answer: "Hive Metastore - Hive metastore (HMS) is a service that stores metadata that is related to presto and other services in a backend relational database. When a new table is created, information that is related to the schema such as column names, data types, are stored in the metastore’s backend database. Download the Hive-compatible client and place it in a directory of your Apache Spark cluster. The Data Engine catalog is compatible with the Hive metastore and can be used as any other external Hive metastore server."
