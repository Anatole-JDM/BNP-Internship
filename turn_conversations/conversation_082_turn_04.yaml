    user_query: "Where can people report a scam that they have been affected by?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "To report a scam, you can report the incident to TIGTA and to phishing@irs.gov (Subject: FAX). Additionally, if you have been a victim of monetary or identity theft, you may also file a complaint with the Internet Crime Complaint Center. If you are a U.S. citizen located in the United States or its territories or a U.S. citizen living abroad: complete the appropriate complaint form with the U.S. Securities and Exchange Commission. Forward email to phishing@irs.gov (Subject: Stock). If you are not a U.S. citizen and reside outside the United States, complete the appropriate complaint form with the U.S. Securities and Exchange Commission. Contact your securities regulator and file a complaint. Forward email to phishing@irs.gov (Subject: Stock)."

  - turn_number: 2
    user_query: "How should I avoid to be a  victim of spam texts and emails?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "The best way to avoid being a victim of spam texts and emails, it is  never share your personal information, especially your Social Security number, with someone who reaches out to you unexpectedly. Unsubscribe from unwanted emails to reduce the chances of clicking on links that could lead to a phishing attack. Also report unwanted messages using your phone's \"report junk\" option or forwarding them to 7726 (SPAM) for texts and to your email provider for unwanted emails. Educate yourself by  learning more about how to get fewer spam texts and emails.  If you spot a scam, report it to the FTC at ReportFraud.ftc.gov. Additionally, before entering personal information on a website, email, or text chain, stop and ask yourself why they need this information and what's going to happen to it. Always be cautious when dealing with unsolicited messages."

  - turn_number: 3
    user_query: "Speaking about scams, what are currently the most common scams and frauds?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "Lottery and sweepstakes scams are one of the most common consumer frauds operating today.  You get a card, call, or email telling you that you won. Then  they tell you there is a fee, some taxes, or customs duties to pay. They ask for your bank account information, or ask you to send money via a wire transfer or to purchase gift cards and provide the card numbers. Government Impostor scams  are also very common : You get a text, call, or email from someone who says they are with the government. They may claim to be a U.S. Marshal, saying you must pay a fine for missing jury duty. Or the IRS, saying that you owe thousands in back taxes. Another scam that you must be alert occurs  when someone gets an email or most often a phone call and the caller begins speaking very quickly about common computer issues that slow performance or even potential hacks to your system. There are imposter scammers  that try to convince you to send money by pretending to be someone you know or trust like a sheriff, local, state, or federal government employee, or charity organization. Today, phishing  is very common . the scammer  impersonates a business or a person to trick you into giving out your personal information, such as passwords, credit card numbers, or bank account information. A scammer may use fraudulent emails, texts, or websites to steal this information from you."

