    agent_answer: "Mortgage scams are schemes that can take your money, your house by making a false promise of saving you from foreclosure. These scammers may ask for money upfront and claim to guarantee that you can get your mortgage terms changed. To prevent those scams, you can use a fraud alert , reducing the chance to be a victim of new account identity theft. This way, creditors must check your credit report to take steps to verify your identity before opening a new account, issuing an additional card, or increasing the credit limit on an existing account."

