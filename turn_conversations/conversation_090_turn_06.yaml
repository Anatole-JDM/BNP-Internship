    agent_answer: "In the years of tentative political and economic liberalization after the death of Mao in 1976 , Shakespeare became popular in China. Of all his plays , the most popular in China in the late 1970s and 1980s was Macbeth, as Chinese audiences saw in a play first performed in England in 1606 and set in 11th century Scotland a parallel with the Great Proletarian Cultural Revolution of the late 1960s. The story of a national hero becoming a tyrant complete with a power-hungry wife was seen as a parallel with Mao Zedong and his wife , Jiang Qing . The critic Zhao Xun wrote \"Macbeth is the fifth Shakespearean play produced on the Chinese stage after the smashing of the Gang of Four. This play of conspiracy has always been performed at critical moments in the history of our nation.''"
