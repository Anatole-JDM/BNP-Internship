    macro_informative: ""
    micro_informative: ""
    agent_answer: "Shakespeare's Richard III is a dramatic interpretation of history rather than a strict historical account. While the play is based on the true story of King Richard III of England, it contains numerous historical inaccuracies which can be attributed partly to Shakespeare 's sources, such as Holinshed 's Chronicles, and there is no doubt that Shakespeare drew heavily on Sir Thomas More 's account of Richard III as a criminal and tyrant as inspiration for his own rendering. Shakespeare and the Tudor chroniclers who influenced him, were obliged to portray the downfall of the Plantagenet House of York and the victory of the House of Tudor as good conquering evil. This is usually attributed to bias as a result of a new regime being in place."

