    agent_answer: "It is true that the Soviet Union joined the war against Japan in the final stages and took control of the two northern islands territories such as Sakhalin Island.  Stalin and Molotov strung out the negotiations with the Japanese , giving them false hope of a Soviet - mediated peace .  At the same time , in their dealings with the United States and Britain , the Soviets re-affirmed at the Yalta Conference that the Allies would not accept separate or conditional peace with Japan . The Japanese would have to surrender unconditionally to all the Allies.  The Soviet Union insisted these islands part of its rightful territorial gains from the war. However, this move was indeed seen as opportunistic by some, as it allowed the Soviet Union to expand its territory at a time when Japan was already significantly weakened."

  - turn_number: 8
