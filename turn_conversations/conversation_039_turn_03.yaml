    agent_answer: "Yes, the forms to file a small claims case can be located on the court website under Online Forms by selecting the Judicial Council hyperlink."

  - turn_number: 4
    user_query: "How much is the filing fee?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "In Ventura County the filing fee for a small claims case depends on the amount of your claim: * If your claim is for $1,500.00 or less, the filing fee is $30.00. * If your claim is more than $1,500.00 but less than or equal to $5,000.00, the filing fee is $50.00. * If your claim is more than $5,000.00 but less than or equal to $10,000.00, the filing fee is $75.00. * If you have filed more than 12 small claims in California within the past 12 months, the filing fee is $100.00. Service by certified mail must be done by the clerk's office. The fee is $15.00 per defendant. For Sacramento: Find out how much it will cost to file Small Claims forms online."

  - turn_number: 5
    user_query: "How about mediation?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "You can mediate your case before or after a small claims case has been filed. If you mediate before filing a case and an agreement is reached at the mediation, there will be no need to file a small claims case. If a case has already been filed, the agreement reached at the mediation can be entered into the court record without having to appear in court. The Superior Court of California  provides free mediation services for litigants in small claims cases. The mediation is facilitated by trained volunteer mediators. The benefits of mediation include determining the outcome of the case by the parties themselves, saving important relationships without going to court, and having both views of the dispute heard. If the case is settled after the filing of the claim and before the hearing date, the plaintiff must file Judicial Council form “Request For Dismissal” (CIV-110) with the court."

  - turn_number: 6
    user_query: "We require the assistance of an interpreter."
    macro_informative: ""
    micro_informative: ""
    agent_answer: "If you require the assistance of a foreign language interpreter or a sign language interpreter in a small claims court case, you should inform the court well in advance of your court date to ensure an interpreter is available. The court is responsible for providing foreign or sign language interpreters for parties who need their assistance to understand the legal proceeding, and Court Interpreters are provided free of charge. Just make sure to request this assistance as soon as possible, to avoid delays."

  - turn_number: 7
    user_query: "The defendant and I live in different counties, where do I sue?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "If the defendant and you live in different counties, you can sue in the county where the defendant lives or where the business involved is located, where the damage or accident happened, where the contract was signed or carried out, or if the defendant is a corporation, where the contract was broken. For a retail installment account or sales contract or a motor vehicle finance sale, you can also sue in the county where the property was bought, even if the defendant does not live in that county. If you file your claim in the wrong county, the court will dismiss the claim."

  - turn_number: 8
    user_query: "Can a 17 year old be the defendant in a claim?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "It is unclear, however the plaintiff must be at least 18 years of age to file a claim. If the plaintiff is not yet 18, they need to fill out guardian ad litem form."
