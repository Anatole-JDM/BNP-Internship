  - turn_number: 1
    user_query: "Can you summarize the differences between good bots and bad bots?"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "Bots are software programs that typically use a \"headless browser\" to make HTTP requests and other actions. A bot that performs a helpful service can be considered \"good.\" For example, customer service chatbots, search engine crawlers, and performance monitoring bots are generally good bots. Good bots look for and abide by the rules outlined in a website's robots.txt file and read them and avoid that webpage. On the other hand, bad bots range from malicious to simply annoying; for instance, breaking into user accounts to steal data or buying concert tickets online to assist scalpers. Malicious bots typically don't  check a website's robots.txt file before accessing the website, which generates the need for bot management."

