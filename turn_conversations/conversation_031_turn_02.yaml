    agent_answer: "I do not have specific information about those categories of people that should get a flu vaccine. Nevertheless, vaccination is a cheap and effective way of preventing infections by viruses.  Their use has resulted in a dramatic decline in morbidity ( illness ) and mortality ( death ) associated with viral infections such as polio , measles , mumps and rubella . In fact, vaccines are available to prevent over thirteen viral infections of humans , and more are used to prevent viral infections of animals ."

