    agent_answer: "I am not sure what you would like to know about node data but I can inform you that there are  some sort of nodes.    For instance  ordering node  that collects transactions from network members, orders the transactions and bundles them into blocks. Also known as orderer. Another one is Peer that is a blockchain network resource that provides the services to execute and validate transactions, and maintain ledgers. The peer runs smart contract and is the holder of transaction history and the current state of assets on ledgers. They are owned and managed by organizations and are joined to channels.  Additionally to those two, CA is another node that  issues certificates to all network participants (peers, ordering services, clients, admins, and so on). These certificates, which include a signing certificate and private key, allow network participants to communicate, authenticate, and ultimately transact. These CAs will create all of the identities and certificates that belong to your organization, in addition to defining the organization itself. You can then use those identities to deploy nodes, create admin identities, and submit transactions."
