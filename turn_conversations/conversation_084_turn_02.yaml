    user_query: "what is the defense of marriage act 1996"
    agent_answer: "The Defense of Marriage Act (DOMA) is a United States federal law that defines and protects the institution of marriage. enacted in 1996. It was introduced by Georgia Representative Bob Barr and Senator Don Nickles of Oklahoma. The Act was intended by Congress to reflect and honor a collective moral judgment and to express moral disapproval of homosexuality. It also defined marriage for federal purposes as the legal union of a man and a woman as husband and wife, and a spouse as a husband or wife of the opposite sex. Section 3 of DOMA defines marriage and spouse for federal purposes. Section 3 codified non-recognition of same - sex marriages for all federal purposes, including insurance benefits for government employees, social security survivors ' benefits, immigration, bankruptcy, and the filing of joint tax returns, as well as excluding same - sex spouses from the scope of laws protecting families of federal officers, laws evaluating financial aid eligibility, and federal ethics laws applicable to opposite - sex spouses."

