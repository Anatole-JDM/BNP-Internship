    agent_answer: "The choice between the First-In-First-Out (FIFO) and Last-In-First-Out (LIFO) methods for determining which shares are sold first when you sell shares of a stock you own can have different tax implications. Under the FIFO method, the oldest shares are considered sold first and pay lower capital gains tax rate instead of the short term marginal rate.  Under the LIFO method, the most recently acquired shares are sold first.    If you're selling at loss and have other short term gains, you would probably be better selling LIFO, so that the loss could offset other short term gains that you might have.  The default is FIFO."

