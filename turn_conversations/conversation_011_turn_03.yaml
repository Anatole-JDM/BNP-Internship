turns:
  - turn_number: 1
    user_query: "I need to do some legal research to be prepared for my oral argument. Can I visit the law library?"
    macro_informative: "0"
    micro_informative: "1"
    agent_answer: "Yes, you can visit the law library to conduct legal research for your oral argument. The library can provide self-help guides and suggest materials that may be beneficial, such as resources on reserve or located at the reference desk. Additionally, the Form APP-001 provides comprehensive instructions on appeal procedures. Each Court of Appeal offers self-help resources online. You can also inquire with your local Court of Appeal to check if they have a self-help center at the court."

  - turn_number: 2
    user_query: "How to Hire a Lawyer"
    macro_informative: "1"
    micro_informative: "1"
    agent_answer: "When looking to hire a lawyer, you can visit the California Courts website, which provides a lot of information about lawyers and legal assistance. If you need help finding a lawyer, the California Bar Association website can connect you with a lawyer referral service in your area. When you meet with a lawyer, it's important to ask questions to understand the services they can provide and the associated costs. You should also ask about their experience in handling cases similar to yours. If you find their answers satisfactory and their fees reasonable, you may want to consider hiring them. However, make sure you fully understand the agreement before signing it. If you're uncomfortable with any terms, don't sign it. It may be best to seek a new lawyer if disagreements arise and cannot be resolved."

  - turn_number: 3
    user_query: "What are the grounds for lodging an appeal?"
    macro_informative: "1"
    micro_informative: "1"
    rewrite:
      rewritten_query: "What are valid legal grounds for filing an appeal?"
      macro_informative: "1"
      micro_informative: "1"
      correctness:
        changes: "["the grounds" > "valid legal grounds"]"
        groundedness: "1"
    agent_answer: "In most cases, the appellate court considers two main points: whether a legal mistake was made in the trial court and whether this mistake affected the final decision (referred to as the \"judgment\"). The appellate court only reviews what happened in the trial court to determine if a legal mistake occurred in the original trial. An appeal is a process through which a case is moved from a lower court to a higher court for review or reconsideration after the lower court has issued a judgment. The higher or appellate court may uphold, reverse, or modify the decision."