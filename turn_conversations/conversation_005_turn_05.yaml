    agent_answer: "To open a second bank account, you can go to a bank of your choice and let them know that you have an existing checking account and that you would like to open a second checking account. You will need USA address to open an account in USA. You also can open one with SSN and foreign passport. However, bank will require you to deposit $1500 only to get you a debit card, and you are required to maintain min balance of $1500 only."

