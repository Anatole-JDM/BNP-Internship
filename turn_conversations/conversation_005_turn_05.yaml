    macro_informative: ""
    micro_informative: ""
    agent_answer: "Some people separate off regular planned expenses (rent/mortgage, utility bills, insurance premiums) from spending money. For example, one gets a direct deposit totaling the sum of regular monthly bills and a prorated provision for longer term regular bills like semi-annual car insurance premiums; and the other one gets a direct deposit of the rest which I then allocate to savings and spending. For another example, use account B for all my expenses (rent, credit card, food, etc) and use account A to save money."

