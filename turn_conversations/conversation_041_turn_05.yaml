    agent_answer: "Yes, you can take out a loan to open a business. In fact you can give a loan to the company from yourself as a private person, and when the company makes money, the company pays it back to you. Then the company pays for all the expenses with the money from the loan.  it is noteworthy to mention that when you ask for business loan the bank looks at the background of the owners as it is a small business. Also it can depend of the bank as they need to understand the purpose of the loan and need it to be secured. hey may not even grant such kind of business loan. You really need to  show them a solid business plan and your profits for each year."

