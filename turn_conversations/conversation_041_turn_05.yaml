    agent_answer: "If you are a newly registered small business owner, you can look into getting a business card using your \"\"personal\"\" credit score to get the credit and when you get it, you can add authorized users to the main account and set a spending limit on each card. It is important to note that  business credit normally refers to one or more credit cards which can be used to make purchases on behalf of a business. A business credit card will usually have both the business name and the card holder's name printed or embossed on the card. In most cases the cardholder will have provided a personal guarantee when applying for the card. A personal guarantee ultimately makes the card holder liable for all charges made on the card."

