    user_query: "what makes the different shapes of the moon"
    agent_answer: "The different shapes of the Moon, also known as lunar phases, are determined by the amount of sunlight that is illuminating the portion of the Moon visible from Earth. This changes as the Moon orbits the Earth and the relative positions of the Moon, Earth, and Sun shift. When the Sun, Earth, and Moon are aligned, with the Sun and Moon on opposite sides of the Earth, we see a full moon. When the Moon is positioned between the Earth and the Sun, we see a new moon. The crescent and gibbous shapes occur during the intervals between these principal phases, when only a portion of the Moon's surface is illuminated. The specific shape at any given time depends on the Moon's position in its orbit. When a sphere is illuminated on one hemisphere and viewed from a different angle , the portion of the illuminated area that is visible will have a two - dimensional shape defined by the intersection of an ellipse and circle ( where the major axis of the ellipse coincides with a diameter of the circle ) . If the half - ellipse is convex with respect to the half - circle , then the shape will be gibbous ( bulging outwards ) whereas if the half - ellipse is concave with respect to the half - circle , then the shape will be a crescent ."

