    agent_answer: "The average distance from the Moon to the Earth is about 238,856 miles or 384,402 kilometers. But this distance varies throughout the Moon's orbit, ranging from about 221,500 miles or 385,000 kilometers at its closest, to about 252,700 miles or 406,700 kilometers at its farthest resulting in a differential range of 50,200 kilometers or 31,200 miles. Lunar distance (astronomy) Astronomers O'Keefe and Anderson calculated the lunar distance by observing 4 occultations from 9 locations in 1952 . They calculated a mean distance of 7008384407600000000 ♠ 384 407. 6 ± 4.7 km , however the value was refined by in 1962 by Irene Fischer , who incorporated updated geodetic data to produce a value of 7008384403700000000 ♠ 384 403. 7 ± 2 km ."
