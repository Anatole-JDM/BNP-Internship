    agent_answer: "If your partner dies, you are not responsible for paying for their debts. If the deceased has any assets at all, there is usually a legally defined order in which debtor types must be paid. If there are no assets held by just the deceased, as you get bills you just send a certified copy of the death certificate, tell them there is no estate, then forget about them."

  - turn_number: 7
    user_query: "that's a relief, but I could really use the assets"
    macro_informative: ""
    micro_informative: ""
    agent_answer: "If your relative had debts when they passed away, the creditors have a legal right to attempt to collect those debts from the estate. The order in which debtors are paid is usually determined by law and can vary by jurisdiction. Many assets pass to heirs without the probate process and in some cases all of them pass this way. You are under no legal obligation to pay off the debts and you can wait for the statute of limitations to run out."
