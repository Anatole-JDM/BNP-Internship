    agent_answer: "If you have a significant amount of debt and the housing market is rising, delaying your house purchase another year you could well end up forking out extra money on the mortgage due to the rise in house prices. However, in order to roll debt into a home purchase, you need to have a sufficient down payment. However, if you have a lot of debt, it's unlikely that you have the necessary funds for a substantial down payment. Therefore, renting and paying off your debt first might be the better option."

