    agent_answer: "The number of skills you can create depends on your Watson Assistant plan type. Any sample dialog skills that are available for you to use do not count toward your limit unless you use them. A skill version does not count as a skill: - Enterprise: 100 - Premium (legacy): 100 - Plus: 50 - Standard (legacy): 20 - Lite, Trial: 5 Additionally, after 30 days of inactivity, an unused skill in a Lite plan service instance might be deleted to free up space."

