    agent_answer: "To set the bidirectional capabilities for handling the reverse order of text, follow these steps: 1. Go to your skill tile and click the Actions drop-down menu. 2. Select Language Preferences. 3. Choose the appropriate options for your skill, including selecting a bidirectional language like Hebrew. GUI Direction: Specifies the layout direction of elements, such as buttons or menus, in the graphical user interface. Choose LTR (left-to-right) or RTL (right-to-left). If not specified, the tool follows the web browser GUI direction setting.
