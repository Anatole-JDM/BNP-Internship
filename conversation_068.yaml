    macro_informative: ""
    micro_informative: ""
    agent_answer: "Accepted Materials for Yard Waste include Grass clippings, Leaves Weeds, Wood Chips/Mulch Brush and Branches (up to 6 inches in diameter and no longer than 10 feet in length). Yard waste shall be placed in the green container(s)."
