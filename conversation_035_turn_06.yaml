    agent_answer: "The most common varieties found in pet stores are the English shorthair ( also known as the American ), and the Abyssinian. Also popular among breeders are the Peruvian and the Sheltie ( or Silkie ). The guinea pig or domestic guinea pig ( Cavia porcellus ) is a species of rodent belonging to the family Caviidae and the genus Cavia. Guinea pig C. porcellus is likely descended from closely related species of cavies , such as C. aperea , C. fulgida , and C. tschudii."

